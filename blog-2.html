    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --surface2: #1a1a1a;
            --text: #e0e0e0;
            --text-dim: #888888;
            --accent: #ff3366;
            --accent2: #00e5ff;
            --border: #2a2a2a;
            --font-mono: 'Courier New', monospace;
            --font-sans: 'Helvetica Neue', Arial, sans-serif;
            --gap: 1.5rem;
            --max-w: 1400px;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        .texture-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.5;
        }
        .container {
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 0 var(--gap);
            position: relative;
            z-index: 1;
        }
        h1, h2, h3, .display, .hero-title {
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }
        h1 {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            text-transform: uppercase;
            border-bottom: 4px solid var(--accent);
            display: inline-block;
            padding-bottom: 0.5rem;
            margin-bottom: 2rem;
            color: #ffffff;
        }
        h2 {
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            margin: 3rem 0 1.5rem;
            padding-left: 1.5rem;
            border-left: 6px solid var(--accent2);
            color: #ffffff;
        }
        h3 {
            font-size: clamp(1.3rem, 2.5vw, 1.8rem);
            margin: 2rem 0 1rem;
            color: var(--accent2);
            letter-spacing: 0.05em;
        }
        p, li, a, span, div {
            font-size: 1rem;
        }
        a {
            color: var(--accent2);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: all 0.2s ease;
        }
        a:hover {
            border-bottom-color: var(--accent2);
            color: #ffffff;
        }
        .sect {
            margin: 4rem 0;
            position: relative;
        }
        /* NAV */
        .nav-present {
            background: var(--surface);
            border-bottom: 2px solid var(--border);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        .nav-present .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .nav-present .logo {
            font-family: var(--font-mono);
            font-weight: 900;
            font-size: 1.3rem;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .nav-present .logo span {
            color: var(--accent);
        }
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            flex-wrap: wrap;
        }
        .nav-links a {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
            border-bottom: none;
            position: relative;
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0%;
            height: 2px;
            background: var(--accent);
            transition: width 0.3s ease;
        }
        .nav-links a:hover::after, .nav-links a.active::after {
            width: 100%;
        }
        .nav-links a.active {
            color: #fff;
        }
        .tel-link {
            font-family: var(--font-mono);
            background: var(--surface2);
            padding: 0.5rem 1.2rem;
            border-radius: 2px;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .tel-link:hover {
            background: var(--accent);
            color: #000;
            border-bottom: 1px solid var(--accent);
        }
        .hamburger-menu {
            display: none;
            cursor: pointer;
            flex-direction: column;
            gap: 5px;
            padding: 0.5rem;
        }
        .hamburger-menu span {
            width: 28px;
            height: 2px;
            background: #fff;
            display: block;
            transition: 0.3s;
        }
        /* HERO */
        .hero-title {
            font-size: clamp(3rem, 8vw, 6rem);
            margin: 3rem 0 1rem;
            text-transform: uppercase;
            word-break: keep-all;
            position: relative;
        }
        .hero-title::before {
            content: 'COMPARE';
            position: absolute;
            top: -2rem;
            left: -0.5rem;
            font-size: 0.9rem;
            font-family: var(--font-mono);
            color: var(--accent);
            letter-spacing: 0.3em;
            font-weight: 400;
        }
        /* CARDS */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 2rem;
            position: relative;
            transition: transform 0.3s ease, border-color 0.3s ease;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 0%;
            background: var(--accent);
            transition: height 0.4s ease;
        }
        .card:hover::before {
            height: 100%;
        }
        .card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
        }
        .card h3 {
            margin-top: 0;
            color: #fff;
        }
        .card .tag {
            display: inline-block;
            background: var(--accent2);
            color: #000;
            padding: 0.2rem 0.8rem;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }
        .card ul {
            list-style: none;
            padding: 0;
        }
        .card ul li {
            padding: 0.3rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
            color: var(--text-dim);
        }
        .card ul li::before {
            content: '▹ ';
            color: var(--accent);
        }
        /* COMPARISON TABLE */
        .compare-table-wrap {
            overflow-x: auto;
            margin: 2rem 0;
            border: 1px solid var(--border);
        }
        .compare-table {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            min-width: 700px;
        }
        .compare-table th {
            background: var(--surface);
            color: var(--accent);
            padding: 1rem;
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 2px solid var(--accent);
        }
        .compare-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }
        .compare-table tr:nth-child(even) td {
            background: rgba(255,255,255,0.01);
        }
        .compare-table tr:hover td {
            background: rgba(255,51,102,0.05);
        }
        .highlight-col {
            background: rgba(0,229,255,0.05) !important;
            border-left: 3px solid var(--accent2);
        }
        /* FAQ */
        .faq-item {
            border: 1px solid var(--border);
            margin-bottom: 1rem;
            background: var(--surface);
            cursor: pointer;
            transition: 0.3s;
        }
        .faq-item:hover {
            border-color: var(--accent2);
        }
        .faq-q {
            padding: 1.2rem;
            font-weight: 700;
            font-family: var(--font-mono);
            letter-spacing: 0.05em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .faq-q::after {
            content: '+';
            font-size: 1.5rem;
            color: var(--accent);
            transition: 0.3s;
        }
        .faq-item.open .faq-q::after {
            content: '−';
            color: var(--accent2);
        }
        .faq-a {
            padding: 0 1.2rem 1.2rem;
            color: var(--text-dim);
            display: none;
        }
        .faq-item.open .faq-a {
            display: block;
        }
        .faq-item.open {
            border-color: var(--accent2);
            box-shadow: 0 0 20px rgba(0,229,255,0.1);
        }
        /* FOOTER */
        .site-footer {
            border-top: 2px solid var(--border);
            margin-top: 5rem;
            padding: 3rem 0;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-dim);
            text-align: center;
        }
        /* RESPONSIVE */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
                flex-direction: column;
                width: 100%;
                background: var(--surface);
                padding: 1rem;
                border-top: 1px solid var(--border);
            }
            .nav-links.open {
                display: flex;
            }
            .hamburger-menu {
                display: flex;
            }
            .nav-present .container {
                flex-wrap: wrap;
            }
            .card-grid {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 2rem;
            }
            .hero-title {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
